name: sdk-go-client-webdav
title: SDK Go Client WebDAV
version: 1.0.0
summary: ctrlX WebDAV protocol sample written in Go for ctrlX OS.
description: The sample demonstrates how to access to configuration files of a ctrlX OS remotely using the WebDAV protocol.
confinement: strict
grade: stable

contact: https://github.com/boschrexroth/ctrlx-automation-sdk
license: MIT
donation: https://github.com/boschrexroth/ctrlx-automation-sdk
issues: https://github.com/boschrexroth/ctrlx-automation-sdk/issues
source-code: https://github.com/boschrexroth/ctrlx-automation-sdk
website: https://github.com/boschrexroth/ctrlx-automation-sdk

base: core24
type: app

platforms:
  amd64:
  arm64:
    build-on: [amd64, arm64]
    build-for: [arm64]

apps:
  client:
    command: bin/client
    plugs:
      - network
      - datalayer
    daemon: simple
    restart-condition: always
    passthrough:
      restart-delay: 10s

parts:
  client:
    plugin: go
    source: .
    build-snaps: ["go/1.25/stable"]
    stage-packages:
      - ctrlx-datalayer
    build-packages:
      - on amd64:
          - libsystemd-dev
          - pkg-config
      - on arm64:
          - libsystemd-dev:arm64
        #- pkg-config:arm64
    override-build: |
      case $CRAFT_ARCH_TRIPLET_BUILD_FOR in
        aarch64-linux-gnu)
          export GOARCH=arm64
          export GOARM=7
          export CGO_ENABLED=1
          export CC=aarch64-linux-gnu-gcc
          ;;
        amd64)
          export GOARCH=amd64
          ;;
      esac
      go build -buildvcs=false -o ../install/bin/ ./...

plugs:
  datalayer:
    interface: content
    content: datalayer
    target: $SNAP_DATA/.datalayer

lint:
  ignore:
    - library:
        - usr/lib/aarch64-linux-gnu/libcomm_datalayer.so.*
        - usr/lib/x86_64-linux-gnu/libcomm_datalayer.so.*
