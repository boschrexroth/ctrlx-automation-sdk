name: sdk-generate-manifest
title: SDK Generate Manifest
base: core24
version: 1.0.0
summary: Simple snap with random menu entry.
description: |
  This is a sample snap that generates a random menu entry when getting installed or updated.

grade: stable

contact: https://github.com/boschrexroth/ctrlx-automation-sdk
license: MIT
donation: https://github.com/boschrexroth/ctrlx-automation-sdk
issues: https://github.com/boschrexroth/ctrlx-automation-sdk/issues
source-code: https://github.com/boschrexroth/ctrlx-automation-sdk
website: https://github.com/boschrexroth/ctrlx-automation-sdk

confinement: strict

platforms:
  amd64:
  arm64:
    build-on: [amd64, arm64]
    build-for: [arm64]

parts:
  dump:
    plugin: dump
    source: ./dump
    stage-packages:
      - wamerican
      - jq
apps:
  my-service:
    command: bin/service.sh
    daemon: simple

slots:
  package-assets:
    interface: content
    content: package-assets
    source:
      read:
        - $SNAP_DATA/package-assets/$CRAFT_PROJECT_NAME
