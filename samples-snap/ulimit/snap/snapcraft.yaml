name: sdk-ulimit-n-16384
title: SDK Ulimit
base: core24
version: 1.0.0
summary: Ulimit demo snap for ctrlX OS.
description: |
  This app demonstrates how you can increase the maximum number of open files with the command 'ulimit -n 16384' called by a command-chain wrapper.

grade: stable

contact: https://github.com/boschrexroth/ctrlx-automation-sdk
license: MIT
donation: https://github.com/boschrexroth/ctrlx-automation-sdk
issues: https://github.com/boschrexroth/ctrlx-automation-sdk/issues
source-code: https://github.com/boschrexroth/ctrlx-automation-sdk
website: https://github.com/boschrexroth/ctrlx-automation-sdk

confinement: strict

platforms:
  amd64:
  arm64:
    build-on: [amd64, arm64]
    build-for: [arm64]

parts:
  ulimit-script:
    plugin: dump
    source: ./ulimit-script

apps:
  ulimit:
    daemon: simple
    command: increase-ulimit.sh
