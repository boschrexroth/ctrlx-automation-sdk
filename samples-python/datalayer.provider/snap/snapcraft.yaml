name: sdk-py-provider
title: SDK Python Provider
version: 1.0.0
summary: ctrlX Data Layer provider sample written in Python for ctrlX
description: |
  This sample shows how to provide data to the ctrlX Data Layer
base: core24
confinement: strict
grade: stable

contact: https://github.com/boschrexroth/ctrlx-automation-sdk
license: MIT
donation: https://github.com/boschrexroth/ctrlx-automation-sdk
issues: https://github.com/boschrexroth/ctrlx-automation-sdk/issues
source-code: https://github.com/boschrexroth/ctrlx-automation-sdk
website: https://github.com/boschrexroth/ctrlx-automation-sdk

platforms:
  amd64:
  arm64:
    build-on: [amd64, arm64]
    build-for: [arm64]

apps:
  provider:
    command: bin/run.sh
    plugs:
      - network
      - datalayer
    daemon: simple
    restart-condition: always
    passthrough:
      restart-delay: 15s

parts:
  provider:
    plugin: python
    source: .
    stage-packages:
      - ctrlx-datalayer

  bfbs:
    plugin: dump
    source: ./bfbs

  wrapper-scripts:
    plugin: dump
    source: wrapper/
    organize:
      ./run.sh : bin/run.sh

plugs:
  datalayer:
    interface: content
    content: datalayer
    target: $SNAP_DATA/.datalayer

lint:
  ignore:
    - library:
        - usr/lib/aarch64-linux-gnu/libcomm_datalayer.so.*
        - usr/lib/x86_64-linux-gnu/libcomm_datalayer.so.*
