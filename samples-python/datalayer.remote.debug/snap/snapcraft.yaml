name: sdk-py-remote-debug
title: SDK Python Remote Debug
version: 1.0.0
summary: ctrlX Data Layer client demonstrates remote debugging on a ctrlX
description: |
  The sample demonstrates how remote debugging on a ctrlX can be done.
base: core24
confinement: strict
grade: stable

contact: https://github.com/boschrexroth/ctrlx-automation-sdk
license: MIT
donation: https://github.com/boschrexroth/ctrlx-automation-sdk
issues: https://github.com/boschrexroth/ctrlx-automation-sdk/issues
source-code: https://github.com/boschrexroth/ctrlx-automation-sdk
website: https://github.com/boschrexroth/ctrlx-automation-sdk

platforms:
  amd64:
  arm64:
    build-on: [amd64, arm64]
    build-for: [arm64]

apps:
  app:
    command: bin/run.sh
    plugs:
      - network
      - network-bind
      - datalayer
    daemon: simple

parts:
  app:
    plugin: python
    source: .
    stage-packages:
      - ctrlx-datalayer
  
  wrapper-scripts:
    plugin: dump
    source: wrapper/
    organize:
      ./run.sh : bin/run.sh

plugs:
  datalayer:
    interface: content
    content: datalayer
    target: $SNAP_DATA/.datalayer

lint:
  ignore:
    - library:
        - usr/lib/aarch64-linux-gnu/libcomm_datalayer.so.*
        - usr/lib/x86_64-linux-gnu/libcomm_datalayer.so.*
