name: sdk-java-provider-sub
title: SDK Java Provider Subscription
version: 1.0.0
summary: ctrlX Data Layer provider sample written in Java for ctrlX OS.
description: This sample shows how a provider supports ctrlX Data Layer subscription interface
confinement: strict
grade: stable

contact: https://github.com/boschrexroth/ctrlx-automation-sdk
license: MIT
donation: https://github.com/boschrexroth/ctrlx-automation-sdk
issues: https://github.com/boschrexroth/ctrlx-automation-sdk/issues
source-code: https://github.com/boschrexroth/ctrlx-automation-sdk
website: https://github.com/boschrexroth/ctrlx-automation-sdk

base: core24
type: app

platforms:
  amd64:
  arm64:
    build-on: [amd64, arm64]
    build-for: [arm64]

apps:
  provider:
    command: bin/provider
    plugs:
      - network
      - datalayer
    daemon: simple
    restart-condition: always
    passthrough:
      restart-delay: 10s

  client:
    command: bin/client
    plugs:
      - network
      - datalayer
    daemon: simple
    restart-condition: always
    passthrough:
      restart-delay: 10s
    after:
      - provider

parts:
  provider:
    plugin: gradle
    source: .
    build-environment:
      - SNAP_BUILD_JAVA_VERSION: "21"
    build-packages:
      - openjdk-21-jdk-headless
    stage-packages:
      - to amd64:
        - openjdk-21-jre-headless
      - to arm64:
        - openjdk-21-jre-headless:arm64

  wrapper-scripts:
    plugin: dump
    source: wrapper/
    organize:
      ./run_provider.sh : bin/provider
      ./run_client.sh : bin/client
  
plugs:
  datalayer:
    interface: content
    content: datalayer
    target: $SNAP_DATA/.datalayer

lint:
  ignore:
    - library:
        - usr/lib/aarch64-linux-gnu/libcomm_datalayer.so.*
        - usr/lib/x86_64-linux-gnu/libcomm_datalayer.so.*
